name: CI/CD Pipeline (APIs + E2E Playwright)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install && npx playwright install --with-deps

    - name: Run Backend and API Tests
      run: |
        npm start & 
        sleep 10 # Damos tiempo a que el servidor y la base de datos arranquen
        npm test # Aquí se ejecutan los tests de Postman/Newman (Requisito 1.a)

    - name: Run Playwright E2E Tests
      run: npx playwright test # Tests de Svelte de cada miembro (Requisito 1.b)

    - name: Deploy to Render
      [cite_start]
      if: success() # Solo si las APIs Y los E2E son correctos 
      run: curl "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

    - name: Upload Playwright Report
      if: failure() # Solo si algo falla, para poder arreglarlo rápido
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7